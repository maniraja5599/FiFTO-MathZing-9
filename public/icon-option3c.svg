<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgC" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f0a"/>
      <stop offset="100%" style="stop-color:#000000"/>
    </linearGradient>
    <linearGradient id="lineC" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#dc2626"/>
      <stop offset="45%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#4ade80"/>
    </linearGradient>
    <filter id="glowC">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="256" cy="256" r="256" fill="url(#bgC)"/>

  <!-- Shield -->
  <path d="M256 44 L446 122 L446 292 Q446 406 256 470 Q66 406 66 292 L66 122 Z"
        fill="#0c1a0c" stroke="none"/>

  <!-- Shield border: green top-left, red top-right, merged bottom -->
  <path d="M256 44 L66 122 L66 292 Q66 406 256 470"
        fill="none" stroke="#22c55e" stroke-width="14" stroke-linecap="round"/>
  <path d="M256 44 L446 122 L446 292 Q446 406 256 470"
        fill="none" stroke="#ef4444" stroke-width="14" stroke-linecap="round"/>

  <!-- Coin / circle in center top -->
  <circle cx="256" cy="175" r="72" fill="#111" stroke="#22c55e" stroke-width="8"/>
  <circle cx="256" cy="175" r="56" fill="none" stroke="#166534" stroke-width="3" opacity="0.5"/>

  <!-- Rupee ₹ symbol inside coin -->
  <text x="256" y="202" font-family="Arial, sans-serif" font-weight="900" font-size="80"
        fill="#22c55e" text-anchor="middle" filter="url(#glowC)">₹</text>

  <!-- Rising line chart below coin -->
  <polyline points="100,390 155,355 200,368 250,318 305,295 360,265 415,235"
            fill="none" stroke="url(#lineC)" stroke-width="10"
            stroke-linecap="round" stroke-linejoin="round"
            filter="url(#glowC)"/>

  <!-- Arrow head at end of line -->
  <polygon points="415,235 440,220 435,248" fill="#4ade80" filter="url(#glowC)"/>

  <!-- Dots on chart line -->
  <circle cx="155" cy="355" r="7" fill="#ef4444"/>
  <circle cx="250" cy="318" r="7" fill="#f97316"/>
  <circle cx="360" cy="265" r="7" fill="#22c55e"/>

  <!-- Bottom shield glow -->
  <ellipse cx="256" cy="462" rx="110" ry="16" fill="#16a34a" opacity="0.15"/>
</svg>
